<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Nibble_Craft.id</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome untuk Ikon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100 font-sans antialiased">

    <!-- LOGIN AREA (PROTEKSI PIN) -->
    <div id="login-screen" class="fixed inset-0 bg-gray-900 flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl text-center space-y-4">
            <div class="w-16 h-16 bg-red-50 text-red-600 rounded-full flex items-center justify-center mx-auto text-2xl shadow-inner">
                <i class="fa-solid fa-lock"></i>
            </div>
            <div>
                <h2 class="text-lg font-black text-gray-950">Admin Authentication</h2>
                <p class="text-xs text-gray-400 mt-1">Masukkan PIN Keamanan untuk mengelola database.</p>
            </div>
            <input type="password" id="admin-pin" placeholder="••••" maxLength="6"
                class="w-full bg-gray-50 border border-gray-200 rounded-xl py-3 text-center text-xl font-bold tracking-widest focus:outline-none focus:border-red-500 focus:bg-white transition-all">
            <button onclick="verifyPin()" 
                class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 rounded-xl text-xs uppercase tracking-wider shadow-md active:scale-95 transition-all">
                Buka Akses 🔑
            </button>
        </div>
    </div>

    <!-- MAIN ADMIN PANEL (HIDDEN BY DEFAULT) -->
    <div id="admin-panel" class="hidden min-h-screen flex flex-col max-w-md mx-auto bg-white shadow-xl relative">
        <!-- Header -->
        <header class="bg-white border-b border-gray-100 px-6 py-4 sticky top-0 z-10 flex justify-between items-center">
            <div>
                <h1 class="text-lg font-black text-red-600 flex items-center gap-1.5">
                    Admin Panel <span class="text-xs bg-red-100 text-red-700 px-2 py-0.5 rounded-full font-bold">Live</span>
                </h1>
                <p class="text-[10px] text-gray-400 font-medium">Nibble_Craft.id Management</p>
            </div>
            <button onclick="logoutAdmin()" class="text-xs bg-gray-100 hover:bg-gray-200 text-gray-600 px-3 py-1.5 rounded-xl font-bold transition-colors">
                <i class="fa-solid fa-right-from-bracket mr-1"></i> Keluar
            </button>
        </header>

        <!-- Content Area -->
        <main class="flex-1 px-6 py-4 pb-12 space-y-4">
            <div>
                <h2 class="text-sm font-black text-gray-950 uppercase tracking-wider mb-1">Moderasi Ulasan</h2>
                <p class="text-xs text-gray-400">Hapus komentar atau spam dari database secara permanen.</p>
            </div>

            <!-- Daftar Komentar dari Firebase -->
            <div id="admin-testimonial-list" class="space-y-3">
                <div class="text-center py-12 text-gray-400 text-xs">
                    <i class="fa-solid fa-circle-notch animate-spin text-lg mb-2 block"></i> Memuat data ulasan...
                </div>
            </div>
        </main>
    </div>

    <!-- ==================== FIREBASE & LOGIC SCRIPTS ==================== -->
    <!-- Firebase Core & Database SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <script>
        // Konfigurasi Firebase milikmu
        const firebaseConfig = {
            apiKey: "AIzaSyAd0EkTcHrM-aN2XIeQkstrf8Dzj9bAJn0",
            authDomain: "nibble-craft-74edf.firebaseapp.com",
            databaseURL: "https://nibble-craft-74edf-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "nibble-craft-74edf",
            storageBucket: "nibble-craft-74edf.firebasestorage.app",
            messagingSenderId: "763856396264",
            appId: "1:763856396264:web:f59eabe3093aabe4d58e5d"
        };

        // Inisialisasi Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // PIN Rahasia (Silakan ganti sesuai kebutuhan keamananmu)
        const MASTER_PIN = "190701";

        // Fungsi Memverifikasi PIN Masuk
        function verifyPin() {
            const pinInput = document.getElementById('admin-pin');
            if (pinInput.value === MASTER_PIN) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('admin-panel').classList.remove('hidden');
                pinInput.value = '';
                // Jalankan listener data
                listenToFirebaseData();
            } else {
                alert('🔴 PIN Keamanan Salah! Akses ditolak.');
                pinInput.value = '';
            }
        }

        // Jalankan verifikasi otomatis jika menekan tombol 'Enter' pada keyboard
        document.getElementById('admin-pin').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') verifyPin();
        });

        // Fungsi Tarik Data Realtime khusus Admin dengan Tombol Hapus
        function listenToFirebaseData() {
            const container = document.getElementById('admin-testimonial-list');
            
            database.ref('testimonials').on('value', (snapshot) => {
                const data = snapshot.val();
                
                if (!data) {
                    container.innerHTML = `
                        <div class="text-center py-12 border border-dashed border-gray-200 rounded-2xl bg-gray-50">
                            <p class="text-xs text-gray-400">Belum ada ulasan masuk di database.</p>
                        </div>`;
                    return;
                }

                // Ambil Unique Key Firebase untuk dijadikan parameter hapus
                const listData = Object.keys(data).map(key => {
                    return { id: key, ...data[key] };
                }).reverse();

                container.innerHTML = listData.map(item => `
                    <div class="bg-gray-50 border border-gray-100 rounded-2xl p-4 flex justify-between items-start gap-4 transition-all hover:border-red-100">
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center gap-2 mb-1.5">
                                <h4 class="text-xs font-bold text-gray-950 truncate">${item.name}</h4>
                                <span class="text-[10px] text-amber-500 font-extrabold flex items-center gap-0.5">
                                    <i class="fa-solid fa-star"></i> ${item.rating}
                                </span>
                            </div>
                            <p class="text-xs text-gray-500 italic break-words">"${item.review}"</p>
                        </div>
                        <button onclick="deleteReview('${item.id}')" 
                            class="bg-red-50 text-red-600 hover:bg-red-100 p-2.5 rounded-xl text-xs transition-all active:scale-90"
                            title="Hapus Komentar">
                            <i class="fa-regular fa-trash-can"></i>
                        </button>
                    </div>
                `).join('');
            });
        }

        // Fungsi Eksekusi Hapus di Firebase
        function deleteReview(id) {
            if (confirm("Hapus ulasan ini secara permanen dari database cloud?")) {
                database.ref(`testimonials/${id}`).remove()
                    .then(() => {
                        // Notifikasi otomatis ter-handle oleh listener realtime .on()
                    })
                    .catch((err) => {
                        console.error("Gagal menghapus data:", err);
                        alert("Terjadi kesalahan sistem saat mencoba menghapus.");
                    });
            }
        }

        // Fungsi Keluar Halaman Admin
        function logoutAdmin() {
            document.getElementById('admin-panel').classList.add('hidden');
            document.getElementById('login-screen').classList.remove('hidden');
        }
    </script>
</body>
</html>
