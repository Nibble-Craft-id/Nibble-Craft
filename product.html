<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nibble Craft</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f7fbfb;
color:#333;
}

html{
scroll-behavior:smooth;
}

header{
position:sticky;
top:0;
z-index:999;
background:white;
box-shadow:0 2px 10px rgba(0,0,0,.08);
}

nav{
max-width:1200px;
margin:auto;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 20px;
}

.logo{
display:flex;
align-items:center;
gap:12px;
}

.logo img{
width:42px;
height:42px;
border-radius:50%;
object-fit:cover;
}

.logo span{
font-size:32px;
font-weight:700;
color:#39c5b6;
}

.menu{
display:flex;
gap:20px;
}

.menu a{
text-decoration:none;
color:#333;
font-weight:500;
}

.hero{
position:relative;
margin-top:80px;
}

.hero-img{
position:relative;
width:100%;
}

.hero-img img{
width:100%;
display:block;
border-radius:30px;
box-shadow:0 10px 30px rgba(0,0,0,.1);
}

.hero-btn{
position:absolute;
left:35px;
bottom:35px;
padding:16px 34px;
border-radius:999px;
background:rgba(255,255,255,.9);
backdrop-filter:blur(12px);
-webkit-backdrop-filter:blur(12px);
color:#1f4f4a;
font-weight:700;
text-decoration:none;
box-shadow:0 8px 30px rgba(0,0,0,.12);
transition:.3s;
}

.hero-btn:hover{
transform:translateY(-4px) scale(1.03);
background:#38c6b7;
color:#fff;
}

.btn{
background:#39c5b6;
color:white;
padding:12px 24px;
border:none;
border-radius:30px;
cursor:pointer;
text-decoration:none;
display:inline-block;
}

.container{
max-width:1200px;
margin:auto;
padding:80px 20px;
}

.title{
text-align:center;
margin-bottom:40px;
}

.title h2{
font-size:40px;
color:#39c5b6;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:25px;
}

.card{
background:white;
border-radius:20px;
overflow:hidden;
box-shadow:0 5px 20px rgba(0,0,0,.08);
transition:.3s;
}

.card:hover{
transform:translateY(-10px);
}

.card img{
width:100%;
height:250px;
object-fit:cover;
}

.card-content{
padding:20px;
}

.price{
font-size:22px;
font-weight:bold;
color:#39c5b6;
margin:10px 0;
}

select{
width:100%;
padding:10px;
border:1px solid #ddd;
border-radius:10px;
margin-bottom:15px;
}

.cart{
background:#eef8f7;
padding:30px;
border-radius:20px;
margin-top:40px;
}

.cart-item{
background:white;
padding:15px;
margin-bottom:10px;
border-radius:10px;
}

.cart-item button{
float:right;
background:red;
color:white;
border:none;
padding:5px 10px;
border-radius:5px;
cursor:pointer;
}

.total{
font-size:24px;
font-weight:bold;
margin:20px 0;
}

footer{
background:#39c5b6;
color:white;
text-align:center;
padding:30px;
margin-top:50px;
}

.whatsapp{
position:fixed;
right:20px;
bottom:20px;
width:60px;
height:60px;
background:#25D366;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
color:white;
font-size:30px;
text-decoration:none;
box-shadow:0 5px 20px rgba(0,0,0,.2);
}

.badge{
background:red;
color:white;
padding:2px 8px;
border-radius:50px;
font-size:12px;
margin-left:5px;
}

@media(max-width:768px){

.hero-text h1{
font-size:40px;
}

.menu{
display:none;
}

.badge.bump{
animation:bump .4s;
}

@keyframes bump{
0%{transform:scale(1);}
50%{transform:scale(1.4);}
100%{transform:scale(1);}
}

}

#toast{
position:fixed;
bottom:100px;
right:20px;
background:#39c5b6;
color:white;
padding:14px 22px;
border-radius:12px;
font-weight:600;
box-shadow:0 8px 25px rgba(0,0,0,.2);
opacity:0;
transform:translateY(20px);
transition:.3s;
z-index:9999;
pointer-events:none;
}

#toast.show{
opacity:1;
transform:translateY(0);
}


</style>
</head>

<body>

<header>
<nav>

<div class="logo">
<img src="images/logo.webp" alt=".">
<span>Nibble Craft</span>
</div>

<div class="menu">
<a href="index.html">Beranda</a>
<a href="#produk">Produk</a>
<a href="#keranjang">
Keranjang
<span class="badge" id="jumlahItem">0</span>
</a>
</div>

</nav>
</header>

<div class="hero-img">

<img src="images/hero.webp" alt="Hero Banner">

<a href="#produk" class="btn hero-btn">
Lihat Produk →
</a>

</div>



</section>

<section id="produk">

<div class="container">

<div class="title">
<h2>Katalog Produk</h2>
</div>

<div class="products" id="produk-list"></div>

<div class="cart" id="keranjang">

<h2>
Keranjang Belanja
</h2>

<br>

<div id="cart-items"></div>

<div class="total" id="totalHarga">
Total : Rp 0
</div>

<button class="btn" onclick="checkoutWA()">
Checkout WhatsApp
</button>

</div>

</div>

</section>

<footer>

<h3>Nibble Craft</h3>

<p>
Fresh Dessert • Homemade • Premium Quality
</p>

</footer>

<a class="whatsapp"
href="https://wa.me/08883923632">
☎
</a>

<script>

function showToast(text){

const toast=document.getElementById("toast");

toast.textContent=text;

toast.classList.add("show");

setTimeout(()=>{
toast.classList.remove("show");
},2000);

}

const products=[

{
id:1,
nama:"Mango Sticky Rice",
harga:10000,
gambar:"images/mango.webp",
varian:["Original","Extra Mango"]
},

{
id:2,
nama:"Classic Tiramisu",
harga:7000,
gambar:"images/tiramisu.webp",
varian:["Original","Coffee"]
},

{
id:3,
nama:"Matcha",
harga:7000,
gambar:"images/matcha.webp",
varian:["Matcha"]
},

{
id:4,
nama:"Choco Cheese",
harga:7000,
gambar:"images/chococheese.webp",
varian:["Chococheese","Chocolate"]
}
];

let cart=[];

function renderProducts(){

let html="";

products.forEach(product=>{

let options="";

product.varian.forEach(v=>{

options+=`
<option value="${v}">
${v}
</option>
`;

});

html+=`

<div class="card">

<img src="${product.gambar}">

<div class="card-content">

<h3>${product.nama}</h3>

<div class="price">
Rp ${product.harga.toLocaleString('id-ID')}
</div>

<select id="varian-${product.id}">
${options}
</select>

<button
class="btn"
onclick="addToCart(${product.id})">
Tambah Keranjang
</button>

</div>

</div>

`;

});

document.getElementById("produk-list").innerHTML=html;

}

function addToCart(id){

const produk=products.find(
p=>p.id===id
);

const varian=document.getElementById(
"varian-"+id
).value;

cart.push({

nama:produk.nama,
varian:varian,
harga:produk.harga,
qty:1

});

renderCart();

showToast(
produk.nama +
" (" +
varian +
") ditambahkan ke keranjang 🛒"
);

const badge=document.getElementById("jumlahItem");

badge.classList.remove("bump");

void badge.offsetWidth;

badge.classList.add("bump");

}

function renderCart(){

let html="";
let total=0;

cart.forEach((item,index)=>{

total += item.harga * item.qty;

html += `

<div class="cart-item">

<b>${item.nama}</b>

<br>

Varian :
${item.varian}

<br>

Qty :
${item.qty}

<br>

Rp ${(item.harga*item.qty).toLocaleString('id-ID')}

<button onclick="removeCart(${index})">
X
</button>

</div>

`;

});

document.getElementById("cart-items").innerHTML=html;

document.getElementById("totalHarga").innerHTML=
"Total : Rp "+total.toLocaleString('id-ID');

document.getElementById("jumlahItem").innerHTML=
cart.length;

}

function removeCart(index){

cart.splice(index,1);

renderCart();

}

function checkoutWA(){

if(cart.length===0){

alert("Keranjang masih kosong");

return;

}

let pesan=
"Halo, saya ingin memesan:%0A%0A";

let total=0;

cart.forEach((item,i)=>{

pesan +=
(i+1)+". "+
item.nama+
" ("+item.varian+")"+
"%0A";

total += item.harga;

});

pesan +=
"%0ATotal : Rp "+
total.toLocaleString('id-ID');

window.open(

"https://wa.me/08883923632?text="+pesan,

"_blank"

);

}

renderProducts();

</script>

<div id="toast"></div>

</body>
</html>
