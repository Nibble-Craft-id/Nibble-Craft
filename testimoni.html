```html
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Testimoni Pelanggan - Nibble Craft</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f7fbfb;
color:#333;
}

header{
position:sticky;
top:0;
z-index:999;
background:white;
box-shadow:0 2px 10px rgba(0,0,0,.08);
}

nav{
max-width:1200px;
margin:auto;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 20px;
}

.logo{
font-size:30px;
font-weight:700;
color:#39c5b6;
}

.menu{
display:flex;
gap:20px;
}

.menu a{
text-decoration:none;
color:#333;
font-weight:500;
}

.container{
max-width:900px;
margin:auto;
padding:60px 20px;
}

.title{
text-align:center;
margin-bottom:40px;
}

.title h1{
color:#39c5b6;
margin-bottom:10px;
}

.form-box{
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 5px 20px rgba(0,0,0,.08);
margin-bottom:40px;
}

.form-box input,
.form-box select,
.form-box textarea{
width:100%;
padding:14px;
margin-bottom:15px;
border:1px solid #ddd;
border-radius:12px;
font-size:15px;
}

.btn{
background:#39c5b6;
color:white;
border:none;
padding:14px 28px;
border-radius:999px;
cursor:pointer;
font-weight:600;
}

.testimonial-list{
display:grid;
gap:20px;
}

.testimonial-card{
background:white;
padding:20px;
border-radius:18px;
box-shadow:0 5px 20px rgba(0,0,0,.08);
}

.testimonial-card h3{
color:#39c5b6;
margin-bottom:8px;
}

.rating{
font-size:20px;
margin-bottom:10px;
}

.date{
font-size:12px;
opacity:.6;
margin-top:10px;
}

.empty{
text-align:center;
padding:30px;
background:white;
border-radius:20px;
}

footer{
background:#39c5b6;
color:white;
text-align:center;
padding:25px;
margin-top:60px;
}

@media(max-width:768px){

.menu{
display:none;
}

.logo{
font-size:24px;
}

}

</style>
</head>

<body>

<header>

<nav>

<div class="logo">
Nibble Craft
</div>

<div class="menu">
<a href="index.html">Home</a>
<a href="testimoni.html">Testimoni</a>
</div>

</nav>

</header>

<div class="container">

<div class="title">
<h1>Testimoni Pelanggan</h1>
<p>Bagikan pengalaman Anda bersama Nibble Craft</p>
</div>

<div class="form-box">

<input
type="text"
id="nama"
placeholder="Nama Anda">

<select id="rating">
<option value="⭐⭐⭐⭐⭐">⭐⭐⭐⭐⭐ Sangat Puas</option>
<option value="⭐⭐⭐⭐">⭐⭐⭐⭐ Puas</option>
<option value="⭐⭐⭐">⭐⭐⭐ Cukup</option>
<option value="⭐⭐">⭐⭐ Kurang</option>
<option value="⭐">⭐ Tidak Puas</option>
</select>

<textarea
id="komentar"
rows="5"
placeholder="Tulis pengalaman Anda..."></textarea>

<button
class="btn"
onclick="kirimTestimoni()">
Kirim Testimoni
</button>

</div>

<div
id="testimoniList"
class="testimonial-list">
</div>

</div>

<footer>
© 2026 Nibble Craft
</footer>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getDatabase,
ref,
push,
onValue
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

/* GANTI DENGAN CONFIG FIREBASE ANDA */

const firebaseConfig = {

apiKey: "AIzaSyAd0EkTcHrM-aN2XIeQkstrf8Dzj9bAJn0",
authDomain: "nibble-craft-74edf.firebaseapp.com",
databaseURL: "https://nibble-craft-74edf-default-rtdb.asia-southeast1.firebasedatabase.app/",
projectId: "nibble-craft-74edf",
storageBucket: "nibble-craft-74edf.firebasestorage.app",
messagingSenderId: "763856396264",
appId: "1:763856396264:web:f59eabe3093aabe4d58e5d"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.kirimTestimoni = function(){

const nama =
document.getElementById("nama").value.trim();

const rating =
document.getElementById("rating").value;

const komentar =
document.getElementById("komentar").value.trim();

if(!nama || !komentar){

alert("Lengkapi nama dan komentar");

return;

}

push(ref(db,"testimoni"),{

nama:nama,
rating:rating,
komentar:komentar,
tanggal:new Date().toLocaleString("id-ID")

});

document.getElementById("nama").value="";
document.getElementById("komentar").value="";

alert("Terima kasih atas testimoni Anda ❤️");

};

onValue(ref(db,"testimoni"),(snapshot)=>{

const data = snapshot.val();

let html = "";

if(data){

Object.values(data)
.reverse()
.forEach(item=>{

html += `

<div class="testimonial-card">

<h3>${item.nama}</h3>

<div class="rating">
${item.rating}
</div>

<p>${item.komentar}</p>

<div class="date">
${item.tanggal}
</div>

</div>

`;

});

}else{

html = `

<div class="empty">
Belum ada testimoni.
</div>

`;

}

document.getElementById("testimoniList").innerHTML = html;

});

</script>

</body>
</html>
